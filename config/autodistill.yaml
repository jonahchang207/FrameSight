# AutoDistill pipeline — Valorant footage → labeled YOLO dataset
# Drop .mp4/.mkv/.mov files into data/videos/ then run scripts/autodistill_pipeline.py

paths:
  videos_dir: data/videos
  frames_dir: data/autodistill/frames
  dataset_dir: data/autodistill/dataset
  publish_dir: fn.v1i.yolov8   # optional copy target for local train.ps1

video:
  # true = save every frame in the video (full split)
  every_frame: true
  # only used when every_frame is false (e.g. 2 = two frames per second)
  extract_fps: 30
  # Resize every frame to this size (null = keep native resolution)
  frame_size: [1920, 1080]
  extensions: [.mp4, .mkv, .mov, .avi, .webm]

labeling:
  # owlvit = stable on Windows | owlv2 often breaks transformers (do not use unless fixed)
  base_model: owlvit
  box_threshold: 0.18
  text_threshold: 0.18
  # Prompts → YOLO class: enemy = player BODY, enemy_head = HEAD only
  ontology:
    "valorant player full body": enemy
    "video game fps player character body": enemy
    "shooter game enemy player torso and legs": enemy
    "valorant agent standing": enemy
    "video game character head only": enemy_head
    "valorant player head and face": enemy_head
    "fps game enemy head": enemy_head
    "human head in video game": enemy_head

split:
  val_fraction: 0.15
  seed: 42

classes:
  - enemy
  - enemy_head

colab:
  epochs: 100
  batch: 16
  imgsz: 640
  patience: 20
  model: yolo11n.pt
