<svg xmlns="http://www.w3.org/2000/svg" width="560" height="150" viewBox="0 0 560 150" role="img" aria-label="FrameSight logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#11161d"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="1" y="1" width="558" height="148" rx="18" fill="url(#bg)" stroke="#1f2630" stroke-width="2"/>

  <!-- icon: camera focus frame + crosshair + magnifier -->
  <g transform="translate(34,30)">
    <!-- corner brackets (cyan detection frame) -->
    <g fill="none" stroke="#00ffff" stroke-width="6" stroke-linecap="round">
      <path d="M6 24 V10 a4 4 0 0 1 4 -4 H24"/>
      <path d="M84 24 V10 a4 4 0 0 0 -4 -4 H66"/>
      <path d="M6 66 V80 a4 4 0 0 0 4 4 H24"/>
      <path d="M84 66 V80 a4 4 0 0 1 -4 4 H66"/>
    </g>
    <!-- crosshair (green) -->
    <g stroke="#00ff00" stroke-width="4" stroke-linecap="round">
      <line x1="45" y1="26" x2="45" y2="38"/>
      <line x1="45" y1="52" x2="45" y2="64"/>
      <line x1="26" y1="45" x2="38" y2="45"/>
      <line x1="52" y1="45" x2="64" y2="45"/>
    </g>
    <circle cx="45" cy="45" r="3" fill="#00ff00"/>
    <!-- magnifier glint -->
    <circle cx="74" cy="74" r="13" fill="none" stroke="#00ffff" stroke-width="4"/>
    <line x1="83" y1="83" x2="92" y2="92" stroke="#00ffff" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- wordmark -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="160" y="78" font-size="46" font-weight="700" fill="#e6edf3">Frame<tspan fill="#00ffff">Sight</tspan></text>
    <text x="162" y="108" font-size="17" font-weight="500" fill="#8b949e" letter-spacing="1.5">REAL-TIME SCREEN VISION</text>
  </g>
</svg>
