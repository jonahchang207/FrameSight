<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-label="Annotated FrameSight overlay">
  <defs>
    <linearGradient id="scene" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a4250"/>
      <stop offset="1" stop-color="#222831"/>
    </linearGradient>
    <radialGradient id="mag" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#5a6577"/>
      <stop offset="1" stop-color="#2c333d"/>
    </radialGradient>
  </defs>

  <!-- game scene backdrop -->
  <rect x="20" y="20" width="700" height="520" rx="8" fill="url(#scene)"/>
  <rect x="20" y="20" width="700" height="520" rx="8" fill="none" stroke="#0d1117" stroke-width="2"/>

  <!-- center marker -->
  <g transform="translate(370,280)">
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- ===== target A (nearest center) : cyan box + green dashed corner arrows ===== -->
  <!-- silhouette -->
  <g transform="translate(300,300)" fill="#11161d" opacity="0.85">
    <circle cx="35" cy="22" r="16"/>
    <rect x="14" y="40" width="42" height="60" rx="10"/>
  </g>
  <!-- cyan bounding box -->
  <rect x="304" y="294" width="74" height="118" fill="none" stroke="#00ffff" stroke-width="3"/>
  <text x="306" y="288" font-family="Consolas, monospace" font-size="13" fill="#00ffff">body 0.81</text>

  <!-- green dashed corner arrows from the 4 scene corners to this box's corners -->
  <g stroke="#00ff00" stroke-width="2" stroke-dasharray="6 12" fill="none" marker-end="url(#ah)">
    <line x1="20"  y1="20"  x2="304" y2="294"/>
    <line x1="720" y1="20"  x2="378" y2="294"/>
    <line x1="720" y1="540" x2="378" y2="412"/>
    <line x1="20"  y1="540" x2="304" y2="412"/>
  </g>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0 0 L7 3 L0 6 Z" fill="#00ff00"/>
    </marker>
  </defs>

  <!-- ===== target B (farther) : cyan box only, no arrows ===== -->
  <g transform="translate(560,180)" fill="#11161d" opacity="0.85">
    <circle cx="28" cy="18" r="13"/>
    <rect x="11" y="32" width="34" height="48" rx="8"/>
  </g>
  <rect x="563" y="176" width="60" height="92" fill="none" stroke="#00ffff" stroke-width="3"/>
  <text x="565" y="170" font-family="Consolas, monospace" font-size="13" fill="#00ffff">body 0.66</text>

  <!-- ===== magnifier (hold RMB) : 200% circular inset at screen center ===== -->
  <g transform="translate(370,280)">
    <circle cx="0" cy="0" r="80" fill="url(#mag)"/>
    <!-- zoomed silhouette inside -->
    <g fill="#11161d" opacity="0.9" transform="scale(0.9)">
      <circle cx="-10" cy="-12" r="26"/>
      <rect x="-44" y="16" width="68" height="60" rx="14"/>
    </g>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#00ffff" stroke-width="2.5"/>
  </g>

  <!-- HUD text -->
  <text x="34" y="46" font-family="Consolas, monospace" font-size="13" fill="#00ff88">overlay 164.8 | capture 162.1 | infer  58.3 fps | targets 2</text>

  <!-- ===== callout labels (right rail) ===== -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#e6edf3">
    <!-- box -->
    <line x1="623" y1="222" x2="770" y2="120" stroke="#00ffff" stroke-width="1.5"/>
    <circle cx="770" cy="120" r="3" fill="#00ffff"/>
    <text x="780" y="116" font-weight="600" fill="#00ffff">Cyan detection box</text>
    <text x="780" y="136" font-size="13" fill="#9da7b3">one per detected target</text>

    <!-- arrows -->
    <line x1="378" y1="350" x2="770" y2="240" stroke="#00ff00" stroke-width="1.5"/>
    <circle cx="770" cy="240" r="3" fill="#00ff00"/>
    <text x="780" y="236" font-weight="600" fill="#00ff00">Green corner arrows</text>
    <text x="780" y="256" font-size="13" fill="#9da7b3">drawn only for the box</text>
    <text x="780" y="274" font-size="13" fill="#9da7b3">nearest the screen center</text>

    <!-- magnifier -->
    <line x1="430" y1="240" x2="770" y2="360" stroke="#00ffff" stroke-width="1.5"/>
    <circle cx="770" cy="360" r="3" fill="#00ffff"/>
    <text x="780" y="356" font-weight="600">200% magnifier</text>
    <text x="780" y="376" font-size="13" fill="#9da7b3">circular inset of the center —</text>
    <text x="780" y="394" font-size="13" fill="#9da7b3">appears while RMB is held</text>

    <!-- hud -->
    <line x1="300" y1="42" x2="770" y2="470" stroke="#00ff88" stroke-width="1.5"/>
    <circle cx="770" cy="470" r="3" fill="#00ff88"/>
    <text x="780" y="466" font-weight="600" fill="#00ff88">Live FPS HUD</text>
    <text x="780" y="486" font-size="13" fill="#9da7b3">overlay / capture / inference</text>
  </g>
</svg>
